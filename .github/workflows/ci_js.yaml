name: "CI: JS"

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "ainu-utils/**"
      - "ainu-utils-js/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: ainu-utils-js

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.114

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build
        run: bash ./build.sh
          
      - name: Test
        run: npm exec vitest
